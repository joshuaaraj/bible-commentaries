name: Build Windows exe

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name BibleCommentaries --add-data "index.html;." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BibleCommentaries-windows
          path: dist/BibleCommentaries.exe
