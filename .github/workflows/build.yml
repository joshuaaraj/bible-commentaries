name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name BibleCommentaries --add-data "index.html;." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BibleCommentaries-windows
          path: dist/BibleCommentaries.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-webkit2-4.1

      - name: Install Python dependencies
        # venv with system site packages so PyInstaller can bundle the apt-installed GTK bindings
        run: |
          python3 -m venv --system-site-packages venv
          venv/bin/pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: venv/bin/pyinstaller --onefile --windowed --name bible-commentaries-linux --add-data "index.html:." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bible-commentaries-linux
          path: dist/bible-commentaries-linux

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BibleCommentaries.exe
            dist/bible-commentaries-linux
          generate_release_notes: true
